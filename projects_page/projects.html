    <script>
    // ─── Particles (light) ────────────────────────────────
    particlesJS("particles-js", {
      particles: {
        number: { value: 25 },
        color: { value: ["#c8853a", "#e0a857", "#f5cc80"] },
        opacity: { value: 0.6, random: true },
        size: { value: 2.2, random: true },
        line_linked: { enable: false },
        move: { enable: true, speed: 1.5, direction: "none", random: true, straight: false, out_mode: "out" }
      },
      interactivity: { events: { onhover: { enable: false }, onclick: { enable: false } } },
      retina_detect: false
    });

    // ─── Click particles ──────────────────────────────────
    const clickCanvas = document.getElementById('click-effect');
    const clickCtx = clickCanvas.getContext('2d');
    clickCanvas.width = window.innerWidth; clickCanvas.height = window.innerHeight;
    let clickParticles = [];
    document.addEventListener('click', e => {
      for (let i = 0; i < 6; i++) {
        clickParticles.push({ x: e.clientX, y: e.clientY, radius: Math.random()*3+1, color: `hsl(${Math.random()<0.6?25:40},55%,70%)`, vx: Math.random()*5-2.5, vy: Math.random()*5-2.5, life: 20 });
      }
    });
    window.addEventListener('resize', () => { clickCanvas.width = window.innerWidth; clickCanvas.height = window.innerHeight; });
    function animateClick() {
      clickCtx.clearRect(0,0,clickCanvas.width,clickCanvas.height);
      clickParticles = clickParticles.filter(p => {
        p.life--; if (p.life<=0) return false;
        p.x+=p.vx; p.y+=p.vy; p.radius*=0.96;
        clickCtx.beginPath(); clickCtx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        clickCtx.fillStyle=p.color; clickCtx.globalAlpha=p.life/20; clickCtx.fill();
        return true;
      });
      requestAnimationFrame(animateClick);
    }
    animateClick();

    // ─── Mouse spotlight ─────────────────────────────────
    const spotlight = document.getElementById("mouse-spotlight");
    let mouseX=0,mouseY=0,orbX=0,orbY=0;
    document.addEventListener("mousemove", e => { mouseX=e.clientX; mouseY=e.clientY; });
    function animateCursor() {
      orbX+=(mouseX-orbX)*0.18; orbY+=(mouseY-orbY)*0.18;
      spotlight.style.transform=`translate(${orbX-130}px,${orbY-130}px)`;
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // ─── Title animation ──────────────────────────────────
    const frames = ["@","@p","@pr","@pro","@proj","@proje","@projec","@project","@projects","@projects ","@projects -","@projects - ","@projects - v","@projects - vi","@projects - vir","@projects - vi","@projects - v","@projects - ","@projects -","@projects ","@projects","@project","@projec","@proje","@proj","@pro","@pr","@p","@"];
    let ti = 0;
    setInterval(() => { document.title = frames[ti]; ti = (ti+1) % frames.length; }, 500);
    </script>
